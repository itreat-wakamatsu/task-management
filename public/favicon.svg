<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg    { fill: #0F172A; }
    .track { fill: none; stroke: #1E293B; }
    .check { fill: none; stroke: #F8FAFC; }
    @media (prefers-color-scheme: light) {
      .bg    { fill: #FFFFFF; }
      .track { stroke: #E2E8F0; }
      .check { stroke: #0F172A; }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="22"/>
  <circle class="track" cx="50" cy="50" r="30" stroke-width="8"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#F59E0B" stroke-width="8"
    stroke-linecap="round" stroke-dasharray="132 189" transform="rotate(-90 50 50)"/>
  <polyline class="check" points="34,51 44,62 66,37" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
